<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with cream color -->
  <circle cx="50" cy="50" r="48" fill="#FBF5DD" stroke="#306D29" stroke-width="4"/>
  
  <!-- Pen/Quill icon in forest green -->
  <g transform="translate(30, 25)">
    <!-- Feather/Quill -->
    <path d="M 20 5 Q 25 10, 25 20 L 25 45 Q 25 50, 20 50 L 15 50 Q 10 50, 10 45 L 10 20 Q 10 10, 15 5 Z" 
          fill="#306D29" stroke="#0D530E" stroke-width="1.5"/>
    
    <!-- Feather details -->
    <path d="M 17.5 15 L 12 18" stroke="#E7E1B1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 17.5 22 L 11 25" stroke="#E7E1B1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 17.5 29 L 12 32" stroke="#E7E1B1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 17.5 36 L 13 38" stroke="#E7E1B1" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Pen nib -->
    <path d="M 15 50 L 17.5 60 L 20 50 Z" fill="#0D530E"/>
    
    <!-- Ink dot -->
    <circle cx="25" cy="55" r="2" fill="#0D530E"/>
  </g>
  
  <!-- Decorative dots (representing blog posts/content) -->
  <circle cx="70" cy="35" r="3" fill="#306D29" opacity="0.6"/>
  <circle cx="75" cy="45" r="2.5" fill="#306D29" opacity="0.5"/>
  <circle cx="72" cy="55" r="2" fill="#306D29" opacity="0.4"/>
</svg>
